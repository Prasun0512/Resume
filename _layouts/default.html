<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">

    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="{{ site.title }} profile image">
          {% endif %}
          <span>
            <strong>{{ site.title }}</strong>
            <small>{{ site.tagline }}</small>
          </span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <a href="#about">About</a>
          <a href="#impact">Impact</a>
          <a href="#featured-enterprise-ai-work">Projects</a>
          <a href="#experience">Experience</a>
          <a href="#contact">Contact</a>
          <a class="nav-cta" href="{{ site.links.resume | relative_url }}">Resume</a>
        </nav>
      </header>

      <main id="content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <span>{{ site.author.location }}</span>
        <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
      </footer>
    </div>

    <section class="profile-assistant" aria-label="AI profile assistant">
      <button class="assistant-toggle" type="button" aria-expanded="false" aria-controls="profile-assistant-panel">
        <span>Ask AI</span>
      </button>

      <div class="assistant-panel" id="profile-assistant-panel" hidden>
        <div class="assistant-header">
          <div>
            <strong>Portfolio Assistant</strong>
            <span class="assistant-status">Instant resume mode</span>
          </div>
          <div class="assistant-header-actions">
            <button class="assistant-llm-toggle" type="button">Enable LLM</button>
            <button class="assistant-close" type="button" aria-label="Close assistant">Close</button>
          </div>
        </div>

        <div class="assistant-messages" aria-live="polite"></div>

        <div class="assistant-prompts" aria-label="Suggested questions">
          <button type="button" data-question="Summarize Prasun for a recruiter">Recruiter summary</button>
          <button type="button" data-question="What are Prasun's strongest AI and ML skills?">Top AI skills</button>
          <button type="button" data-question="Tell me about the email-to-case automation project">Email-to-case project</button>
          <button type="button" data-question="How suitable is Prasun for this job description?">Match this JD</button>
        </div>

        <form class="assistant-form">
          <label class="sr-only" for="assistant-input">Ask a question or paste a job description</label>
          <textarea id="assistant-input" rows="3" placeholder="Ask about experience, projects, skills, or paste a JD for fit analysis..."></textarea>
          <button class="btn primary" type="submit">Ask</button>
        </form>
      </div>
    </section>

    <script src="{{ '/assets/js/ai-cursor.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/skill-filter.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/profile-assistant.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
