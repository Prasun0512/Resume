<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">

    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="{{ site.title }} profile image">
          {% endif %}
          <span>
            <strong>{{ site.title }}</strong>
            <small>{{ site.tagline }}</small>
          </span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}">Portfolio</a>
          <a href="{{ site.links.resume | relative_url }}">Resume</a>
          <a href="{{ site.links.github }}">GitHub</a>
          <a href="{{ site.links.linkedin }}">LinkedIn</a>
        </nav>
      </header>

      <main id="content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <span>{{ site.author.location }}</span>
        <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
      </footer>
    </div>
    <script src="{{ '/assets/js/scale.fix.js' | relative_url }}"></script>
  </body>
</html>
